name: iOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve CI simulator
        id: simulator
        run: |
          chmod +x scripts/select-ci-simulator.sh
          SIMULATOR_NAME="$(bash scripts/select-ci-simulator.sh 2>/dev/null | grep '^simulator_name=' | cut -d= -f2-)"
          if [[ -z "$SIMULATOR_NAME" ]]; then
            SIMULATOR_NAME="iPhone 16"
          fi
          echo "name=${SIMULATOR_NAME}" >> "$GITHUB_OUTPUT"
          echo "Using simulator: ${SIMULATOR_NAME}"

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.simulator.outputs.name }}" 2>/dev/null || true
          xcrun simctl bootstatus "${{ steps.simulator.outputs.name }}" -b

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WCS-GoldTest.xcodeproj \
            -scheme WCS-GoldTest

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project WCS-GoldTest.xcodeproj \
            -scheme WCS-GoldTest \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild-build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-build-log
          path: xcodebuild-build.log

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    needs: build
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve CI simulator
        id: simulator
        run: |
          chmod +x scripts/select-ci-simulator.sh
          SIMULATOR_NAME="$(bash scripts/select-ci-simulator.sh 2>/dev/null | grep '^simulator_name=' | cut -d= -f2-)"
          if [[ -z "$SIMULATOR_NAME" ]]; then
            SIMULATOR_NAME="iPhone 16"
          fi
          echo "name=${SIMULATOR_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project WCS-GoldTest.xcodeproj \
            -scheme WCS-GoldTest \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -configuration Debug \
            -only-testing:WCS-GoldTestTests \
            -resultBundlePath TestResults-Unit.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild-unit.log

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ github.run_id }}
          path: |
            TestResults-Unit.xcresult
            xcodebuild-unit.log

  ui-tests:
    name: UI Tests
    runs-on: macos-15
    needs: build
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve CI simulator
        id: simulator
        run: |
          chmod +x scripts/select-ci-simulator.sh
          SIMULATOR_NAME="$(bash scripts/select-ci-simulator.sh 2>/dev/null | grep '^simulator_name=' | cut -d= -f2-)"
          if [[ -z "$SIMULATOR_NAME" ]]; then
            SIMULATOR_NAME="iPhone 16"
          fi
          echo "name=${SIMULATOR_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project WCS-GoldTest.xcodeproj \
            -scheme WCS-GoldTest \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }},OS=latest" \
            -configuration Debug \
            -only-testing:WCS-GoldTestUITests \
            -resultBundlePath TestResults-UI.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild-ui.log

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ github.run_id }}
          path: |
            TestResults-UI.xcresult
            xcodebuild-ui.log

  release-compile:
    name: Release Compile Check
    runs-on: macos-15
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release (no code sign)
        run: |
          set -o pipefail
          xcodebuild build \
            -project WCS-GoldTest.xcodeproj \
            -scheme WCS-GoldTest \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            | tee xcodebuild-release.log

      - name: Upload release build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-release-log
          path: xcodebuild-release.log

  fastlane-test:
    name: Fastlane Test Lane
    runs-on: macos-15
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run fastlane test
        run: bundle exec fastlane ios test

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [build, unit-tests, ui-tests, release-compile, fastlane-test]
    if: always()

    steps:
      - name: Require all jobs to pass
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]] \
            || [[ "${{ needs.unit-tests.result }}" != "success" ]] \
            || [[ "${{ needs.ui-tests.result }}" != "success" ]] \
            || [[ "${{ needs.release-compile.result }}" != "success" ]] \
            || [[ "${{ needs.fastlane-test.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            echo "build: ${{ needs.build.result }}"
            echo "unit-tests: ${{ needs.unit-tests.result }}"
            echo "ui-tests: ${{ needs.ui-tests.result }}"
            echo "release-compile: ${{ needs.release-compile.result }}"
            echo "fastlane-test: ${{ needs.fastlane-test.result }}"
            exit 1
          fi
          echo "All CI checks passed."
