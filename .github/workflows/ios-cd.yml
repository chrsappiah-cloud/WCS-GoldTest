name: iOS CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

concurrency:
  group: ios-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-build:
    name: Release Build
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release for Simulator
        run: |
          CONFIG="${{ github.event.inputs.configuration || 'Release' }}"
          xcodebuild build \
            -project WCS-GoldTest.xcodeproj \
            -scheme WCS-GoldTest \
            -destination 'generic/platform=iOS Simulator' \
            -configuration "$CONFIG" \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive marketing assets
        run: |
          cd Marketing
          zip -r ../marketing-bundle.zip images investor-deck.html

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wcs-goldtest-release-${{ github.sha }}
          path: marketing-bundle.zip

      - name: TestFlight pointer
        run: |
          echo "For TestFlight uploads run the 'TestFlight' workflow."
          echo "https://appstoreconnect.apple.com/apps/6770415355/testflight"
