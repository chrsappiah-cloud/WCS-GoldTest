name: TestFlight

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: TestFlight release notes for testers
        required: false
        default: "Beta build from CI"
      distribute_external:
        description: Distribute to external tester groups
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "testflight/*"
      - "v*"

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload-testflight:
    name: Build & Upload TestFlight
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install Fastlane
        run: bundle install

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/wcs_distribution.mobileprovision

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY_IS_BASE64: "true"
          DEVELOPMENT_TEAM_ID: ${{ secrets.DEVELOPMENT_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TESTFLIGHT_CHANGELOG: ${{ github.event.inputs.changelog || 'Automated TestFlight build' }}
          DISTRIBUTE_EXTERNAL: ${{ github.event.inputs.distribute_external || 'false' }}
          TESTFLIGHT_GROUPS: ${{ secrets.TESTFLIGHT_GROUPS || 'WCS Gold Internal' }}
          BUMP_BUILD: "true"
          SKIP_WAIT_FOR_PROCESSING: "true"
          NOTIFY_EXTERNAL_TESTERS: ${{ github.event.inputs.distribute_external || 'false' }}
        run: |
          export PATH="/opt/homebrew/opt/ruby/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          bundle exec fastlane ios beta

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: WCS-GoldTest-ipa-${{ github.run_number }}
          path: build/WCS-GoldTest.ipa
          if-no-files-found: ignore
